<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Linux导航系统</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:Arial;
}

h1{
    text-align:center;
}

#container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:20px;
    padding:20px;
}

#map{
    width:1000px;
    height:700px;
}

#panel{
    width:250px;
    padding:20px;
    border:1px solid gray;
    border-radius:10px;
    font-size:22px;
    line-height:40px;
}

button{
    width:100%;
    height:40px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>Linux导航系统</h1>

<div id="container">

<!-- 左侧面板 -->
<div id="panel">

<div id="lat">🛰纬度</div>
<div id="lng">🛰经度</div>

<div id="distance">📏距离<br>0 m</div>
<div id="count">📍轨迹点<br>0</div>
<div id="time">🕒时间</div>

<!-- ⭐ 复位按钮（你要的） -->
<button onclick="resetSystem()">
🔄 复位系统
</button>

</div>

<!-- 地图 -->
<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Linux定位</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:

"Microsoft YaHei",

"Segoe UI",

Arial,

sans-serif;

height:100vh;

background:

linear-gradient(
135deg,
#edf2f7,
#dbe4f0);

overflow:hidden;
}


/* 顶部 */

#header{

height:75px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 35px;

background:#fff;

box-shadow:

0 3px 18px rgba(0,0,0,.08);

}



#title{

font-size:32px;

font-weight:700;

color:#1e293b;

}



#status{

display:flex;

gap:15px;

}



.statusBox{

padding:10px 18px;

border-radius:14px;

background:#f8fafc;

font-size:16px;

font-weight:600;

color:#334155;

}



/* 主区域 */

#container{

height:

calc(100vh - 135px);

display:grid;

grid-template-columns:

300px 1fr;

gap:25px;

padding:25px;

}



/* 左侧 */

#panel{

display:flex;

flex-direction:column;

gap:18px;

}



/* 卡片 */

#panel > div{

padding:18px;

border-radius:18px;

background:#fff;

font-size:22px;

line-height:36px;

color:#0f172a;

box-shadow:

0 8px 20px

rgba(0,0,0,.08);

transition:.25s;

}



#panel > div:hover{

transform:

translateY(-2px);

box-shadow:

0 12px 28px

rgba(37,99,235,.12);

}



/* 按钮 */

button{

height:58px;

border:none;

border-radius:16px;

font-size:20px;

font-weight:700;

cursor:pointer;

color:#fff;

background:

linear-gradient(
45deg,
#2563eb,
#3b82f6);

box-shadow:

0 8px 20px

rgba(37,99,235,.25);

transition:.25s;

}



button:hover{

transform:

translateY(-2px);

}



/* 地图 */

#mapBox{

position:relative;

border-radius:25px;

overflow:hidden;

background:#fff;

box-shadow:

0 15px 35px

rgba(0,0,0,.12);

}



#map{

width:100%;

height:100%;

}



#mapTitle{

position:absolute;

top:20px;

left:20px;

z-index:999;

background:

rgba(255,255,255,.95);

padding:10px 16px;

border-radius:14px;

font-size:18px;

font-weight:700;

box-shadow:

0 4px 15px rgba(0,0,0,.1);

}



/* 底部 */

#footer{

height:60px;

display:flex;

justify-content:space-around;

align-items:center;

background:#fff;

color:#64748b;

font-size:15px;

box-shadow:

0 -2px 10px rgba(0,0,0,.05);

}



/* 自适应 */

@media(max-width:1400px){

body{

overflow:auto;

}

#container{

display:flex;

flex-direction:column;

height:auto;

}

#mapBox{

height:700px;

}

}

</style>

</head>

<body>

<div id="header">

<div id="title">

🚀 Linux定位

</div>

<div id="status">

<div class="statusBox">

🛰 GPS运行中

</div>

<div id="clock" class="statusBox">

🕒 --:--:--

</div>

</div>

</div>


<div id="container">

<div id="panel">

<div id="lat">

🛰 纬度

</div>

<div id="lng">

🛰 经度

</div>

<div id="distance">

📏 距离

<br>

0 m

</div>

<div id="count">

📍 轨迹点

<br>

0

</div>

<div id="time">

🕒 时间

</div>

<button onclick="resetSystem()">

🔄 复位系统

</button>

</div>


<div id="mapBox">

<div id="mapTitle">

🗺 实时定位地图

</div>

<div id="map"></div>

</div>

</div>


<div id="footer">

<div>GPS Tracking</div>

<div>Refresh : 3s</div>

<div>Navigation Active</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="app.js"></script>

</body>

</html>
